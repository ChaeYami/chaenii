spring:
  application:
    name: chaenii-portfolio

  main:
    lazy-initialization: true

  jmx:
    enabled: false

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration

  security:
    user:
      name: ${ADMIN_USERNAME}
      password: ${ADMIN_PASSWORD}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui

jwt:
  secret: ${JWT_SECRET:default-dev-secret-replace-in-production-min-32-chars!!}
  expiration-ms: 3600000

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

s3:
  bucket: ${S3_BUCKET}
  region: ${AWS_REGION:ap-northeast-2}
  uploads-prefix: uploads