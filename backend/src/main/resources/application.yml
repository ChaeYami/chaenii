spring:
  application:
    name: chaenii-portfolio

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: public

  flyway:
    enabled: true
    url: jdbc:postgresql://dearmi-db.cp5ajcba5ojx.ap-northeast-2.rds.amazonaws.com:5432/postgres
    user: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    locations: classpath:db/migration
    create-schemas: true
    schemas: chaenii_db
    default-schema: chaenii_db

  security:
    user:
      name: ${ADMIN_USERNAME}
      password: ${ADMIN_PASSWORD}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui

jwt:
  secret: ${JWT_SECRET:default-dev-secret-replace-in-production-min-32-chars!!}
  expiration-ms: 3600000

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
